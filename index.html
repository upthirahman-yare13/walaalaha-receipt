<!DOCTYPE html>
<html>
<head>
    <style>
        /* Card Size: 55mm x 85mm (Xajmiga Credit Card) */
        @page { size: 55mm 85mm; margin: 2mm; }
        body { 
            font-family: 'Times New Roman', serif; 
            width: 55mm; 
            margin: 0 auto;
            text-align: center;
            padding: 5px;
            background: #fff;
        }
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 2px; }
        .divider { width: 40px; height: 2px; background: #000; margin: 0 auto 10px; }
        .info { font-size: 8px; margin-bottom: 20px; }
        .box { border: 1px solid #000; padding: 5px; margin-bottom: 10px; }
        .label { font-size: 7px; text-transform: uppercase; }
        .value { font-size: 14px; font-weight: bold; }
        .footer { font-size: 6px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="logo">WALAALAHA</div>
    <div class="divider"></div>
    <div class="info">Premium Dining | Mogadishu</div>
    
    <div class="box">
        <div class="label">Tirada Dadka</div>
        <div class="value">__________</div>
    </div>
    
    <div class="box">
        <div class="label">Wadarta Guud</div>
        <div class="value">$ __________</div>
    </div>
    
    <div class="footer">Mahadsanidiin soo booqashadaada</div>
</body>
</html>
